name: Motor WI-FI EMTECO
products:
  - id: xyakonle1azq2xgn
    manufacturer: EMTECO
    model: Motor WI-FI EMTECO
entities:
  - entity: cover
    class: curtain
    dps:
      - id: 1
        name: control
        type: string
        mapping:
          - dps_val: open
            value: open
          - dps_val: close
            value: close
          - dps_val: stop
            value: stop
      - id: 3
        name: open
        type: string
        mapping:
          - dps_val: opening
            value: true
          - dps_val: closing
            value: false
          # catch-all: any other/unknown value (eg after a power loss)
          # maps to unknown position instead of breaking the entity
          - value: null
